<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp-style Product Creation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy-50: oklch(98.5% 0.005 210);
      --navy-100: oklch(96.2% 0.008 210);
      --navy-200: oklch(91.5% 0.012 210);
      --navy-300: oklch(85% 0.018 210);
      --navy-400: oklch(70% 0.025 210);
      --navy-500: oklch(55% 0.030 210);
      --navy-600: oklch(43% 0.032 210);
      --navy-700: oklch(34% 0.030 210);
      --navy-800: oklch(24% 0.025 210);
      --navy-900: oklch(16% 0.022 210);
      --navy-950: oklch(10% 0.018 210);

      --orange-400: oklch(72% 0.145 60);
      --orange-500: oklch(65% 0.165 60);
      --orange-600: oklch(56% 0.170 60);
      --orange-700: oklch(47% 0.165 60);

      --accent: oklch(54% 0.06 145);
      --accent-soft: oklch(80% 0.035 145);
      --accent-pale: oklch(95% 0.015 145);

      --bg: oklch(1 0 0);
      --cream: oklch(99% 0.004 210);
      --cream-warm: oklch(97% 0.010 210);
      --ink: oklch(25% 0.025 210);
      --ink-soft: oklch(45% 0.030 210);
      --ink-mute: oklch(60% 0.025 210);
      --rule: oklch(82% 0.018 210);
      --rule-soft: oklch(88% 0.014 210);

      --font-sans: 'Rethink Sans', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;

      --r-pill: 999px;
      --r-lg: 16px;

      --ease: cubic-bezier(.65, .05, .36, 1);
    }

    body {
      font-family: var(--font-sans);
      background: var(--navy-50);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .mockup-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg);
      border-radius: var(--r-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid var(--rule-soft);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--rule-soft);
      background: var(--cream);
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--r-pill);
      background: var(--accent-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
      flex-shrink: 0;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
    }

    .chat-header-status {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--ink-mute);
    }

    .chat-header-icon {
      color: var(--ink-mute);
      opacity: 0.6;
    }

    .chat-body {
      padding: 20px;
      background: var(--cream);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .date-separator {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      padding: 8px 0;
      position: relative;
    }

    .date-separator::before,
    .date-separator::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 60px);
      height: 1px;
      background: var(--rule-soft);
    }

    .date-separator::before { left: 0; }
    .date-separator::after { right: 0; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: messageIn 0.3s var(--ease) both;
    }

    .message.sent {
      align-self: flex-end;
    }

    .message.received {
      align-self: flex-start;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: var(--r-lg);
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
    }

    .message.sent .message-bubble {
      background: var(--accent-pale);
      border: 1px solid var(--accent-soft);
      border-bottom-right-radius: 4px;
      color: var(--ink);
    }

    .message.received .message-bubble {
      background: var(--bg);
      border: 1px solid var(--rule-soft);
      border-bottom-left-radius: 4px;
      color: var(--ink);
    }

    .message-image {
      border-radius: 12px;
      overflow: hidden;
      margin: -10px -14px 8px -14px;
      width: calc(100% + 28px);
      background: var(--navy-100);
      position: relative;
    }

    .message-image-inner {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, var(--navy-100), var(--navy-200));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .message-image-icon {
      width: 48px;
      height: 48px;
      border: 2px solid var(--navy-300);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy-500);
    }

    .message-image-icon svg {
      width: 24px;
      height: 24px;
    }

    .message-image-label {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: rgba(0,0,0,0.4);
      padding: 2px 8px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    .message-caption {
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
    }

    .message-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-mute);
      margin-top: 4px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .message.sent .message-time {
      justify-content: flex-end;
    }

    .message.received .message-time {
      justify-content: flex-start;
    }

    .double-check {
      display: inline-block;
    }

    .double-check svg {
      width: 14px;
      height: 14px;
    }

    .read-receipt {
      color: var(--accent);
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--rule-soft);
      border-radius: var(--r-lg);
      border-bottom-left-radius: 4px;
      animation: typingFade 2.5s var(--ease) both;
      animation-delay: 0.8s;
      opacity: 0;
    }

    @keyframes typingFade {
      0% { opacity: 0; transform: translateY(8px) scale(0.97); }
      15% { opacity: 1; transform: translateY(0) scale(1); }
      70% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(0) scale(1); }
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--navy-400);
      animation: typingBounce 1.4s ease-in-out 3;
      animation-fill-mode: forwards;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .typing-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--ink-mute);
    }

    .chat-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--rule-soft);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
    }

    .chat-input {
      flex: 1;
      border: 1px solid var(--rule);
      border-radius: var(--r-pill);
      padding: 9px 16px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s var(--ease);
    }

    .chat-input::placeholder {
      color: var(--ink-mute);
    }

    .chat-input:focus {
      border-color: var(--ink);
    }

    .chat-send-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-pill);
      border: none;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s var(--ease);
    }

    .chat-send-btn:hover {
      background: oklch(44% 0.06 145);
    }

    .chat-send-btn svg {
      width: 16px;
      height: 16px;
    }

    .message-2 {
      animation-delay: 0.1s;
    }

    .message-3 {
      animation-delay: 3.5s;
    }
  </style>
</head>
<body>
  <div class="mockup-card">
    <div class="chat-header">
      <div class="chat-avatar">JYT</div>
      <div class="chat-header-info">
        <div class="chat-header-name">JYT Product Bot</div>
        <div class="chat-header-status">online</div>
      </div>
      <div class="chat-header-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M10 3.75v12.5M17.5 10h-15"/>
        </svg>
      </div>
    </div>

    <div class="chat-body">
      <div class="date-separator">Today</div>

      <div class="message sent message-2">
        <div class="message-bubble">
          <div class="message-image">
            <div class="message-image-inner">
              <div class="message-image-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="m3 16 5-5 3 3 3-4 7 7"/>
                </svg>
              </div>
              <div class="message-image-label">pashmina shawl</div>
            </div>
          </div>
          <div class="message-caption">Create a product with INR 2000</div>
        </div>
        <div class="message-time">
          2:41 PM
          <span class="double-check read-receipt">
            <svg viewBox="0 0 18 18" fill="currentColor">
              <path d="M11.25 5.25 6.5 10 4.5 8M14.25 5.25 9.5 10M17.25 5.25 12.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="typing-indicator">
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
        <span class="typing-label">JYT Product Bot is typing...</span>
      </div>

      <div class="message received message-3">
        <div class="message-bubble">
          <div style="display: flex; align-items: flex-start; gap: 8px;">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0; margin-top: 2px;">
              <rect x="2" y="3" width="16" height="14" rx="2" stroke="oklch(54% 0.06 145)" stroke-width="1.5"/>
              <path d="M6 7h8M6 10h6M6 13h4" stroke="oklch(54% 0.06 145)" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <div>
              <strong style="font-weight: 600;">Product created as draft</strong>
              <div style="margin-top: 4px; font-size: 13px; color: var(--ink-soft);">
                Handwoven Pashmina Shawl<br>
                Pure Cashmere · Hand-dyed in Jaipur<br>
                200 × 70 cm · Fringed Edges<br>
                SKU: PSM-2024-001<br>
                Price: <strong style="color: var(--ink);">INR 2,000</strong>
              </div>
            </div>
          </div>
        </div>
        <div class="message-time">
          2:41 PM
          <span class="double-check">
            <svg viewBox="0 0" width="14" height="14" fill="none">
              <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
        </div>
      </div>
    </div>

    <div class="chat-footer">
      <input class="chat-input" type="text" placeholder="Type a message..." disabled>
      <button class="chat-send-btn">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.5 2.5 9 11M17.5 2.5l-5 16-3-8-8-3 16-5Z"/>
        </svg>
      </button>
    </div>
  </div>
</body>
</html>
